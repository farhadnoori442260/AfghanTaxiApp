name: afghan_taxi_app
description: "Safir Taxi App Project"
publish_to: 'none'
version: 1.0.0+1

# تنظیم نسخه SDK متناسب با محیط FlutLab شما برای رفع خطای قرمز
environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

  # آدرس‌دهی پوشه‌های زبان و تصاویر طبق ساختار گیت‌هاب شما
  assets:
    - assets/lang/
    - assets/images/

  # تنظیم دقیق فونت‌ها با رعایت فاصله (Space) در نام فایل‌ها
  fonts:
    - family: IranYekan
      fonts:
        - asset: assets/fonts/Qs_Iranyekan.ttf
        - asset: assets/fonts/Qs_Iranyekan bold.ttf
          weight: 700
        - asset: assets/fonts/Qs_Iranyekan light.ttf
          weight: 300
